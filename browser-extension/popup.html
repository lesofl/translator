<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PT → EN Translator</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      width: 280px;
      background: #1a1a2e;
      color: #e0e0e0;
    }

    header {
      background: #16213e;
      padding: 14px 16px;
      border-bottom: 1px solid #0f3460;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    header h1 {
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.3px;
    }

    .badge {
      background: #0f3460;
      color: #4fc3f7;
      font-size: 10px;
      padding: 2px 6px;
      border-radius: 10px;
      font-weight: 700;
    }

    .content {
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    #status-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: #9e9e9e;
    }

    #status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #9e9e9e;
      flex-shrink: 0;
      transition: background 0.3s;
    }

    #status-dot.online  { background: #66bb6a; }
    #status-dot.offline { background: #ef5350; }

    #btn-translate {
      width: 100%;
      padding: 10px;
      background: #0f3460;
      color: #4fc3f7;
      border: 1px solid #4fc3f7;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, opacity 0.2s;
    }

    #btn-translate:hover:not(:disabled) { background: #1a4a7a; }
    #btn-translate:disabled { opacity: 0.4; cursor: not-allowed; }

    #btn-restore {
      width: 100%;
      padding: 8px;
      background: transparent;
      color: #9e9e9e;
      border: 1px solid #333;
      border-radius: 6px;
      font-size: 12px;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
      display: none;
    }

    #btn-restore:hover { border-color: #9e9e9e; color: #e0e0e0; }

    #progress {
      display: none;
      flex-direction: column;
      gap: 4px;
    }

    #progress-bar-wrap {
      background: #0f3460;
      border-radius: 4px;
      height: 6px;
      overflow: hidden;
    }

    #progress-bar {
      height: 100%;
      background: #4fc3f7;
      width: 0%;
      transition: width 0.2s;
    }

    #progress-label {
      font-size: 11px;
      color: #9e9e9e;
      text-align: right;
    }

    #lang-row {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: #9e9e9e;
    }

    #lang-select {
      flex: 1;
      background: #16213e;
      color: #e0e0e0;
      border: 1px solid #0f3460;
      border-radius: 4px;
      padding: 4px 6px;
      font-size: 12px;
    }

    #message {
      font-size: 11px;
      color: #ef9a9a;
      min-height: 14px;
    }
  </style>
</head>
<body>
  <header>
    <div>
      <h1>Lingua</h1>
    </div>
    <button id="btn-settings" title="Settings" style="background:none;border:none;color:#9e9e9e;cursor:pointer;font-size:16px;padding:0;line-height:1;">&#9881;</button>
    <div class="badge">OFFLINE</div>
  </header>

  <div class="content">
    <div id="status-bar">
      <div id="status-dot"></div>
      <span id="status-text">Checking server...</span>
    </div>

    <div id="lang-row">
      <span>From:</span>
      <select id="lang-select">
        <option value="pt">Portuguese (pt)</option>
        <option value="ja">Japanese (ja)</option>
      </select>
      <span>→ EN</span>
    </div>

    <button id="btn-translate" disabled>Translate Page</button>
    <button id="btn-restore">Restore Original</button>

    <div id="progress">
      <div id="progress-bar-wrap">
        <div id="progress-bar"></div>
      </div>
      <div id="progress-label">0 / 0</div>
    </div>

    <div id="message"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
