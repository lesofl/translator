<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lingua Settings</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      padding: 24px;
      min-width: 360px;
    }

    h1 {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 20px;
      color: #4fc3f7;
    }

    .field {
      margin-bottom: 16px;
    }

    label {
      display: block;
      font-size: 12px;
      color: #9e9e9e;
      margin-bottom: 6px;
    }

    input[type="url"] {
      width: 100%;
      padding: 8px 10px;
      background: #16213e;
      color: #e0e0e0;
      border: 1px solid #0f3460;
      border-radius: 4px;
      font-size: 13px;
    }

    input[type="url"]:focus {
      outline: none;
      border-color: #4fc3f7;
    }

    button {
      padding: 8px 20px;
      background: #0f3460;
      color: #4fc3f7;
      border: 1px solid #4fc3f7;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    button:hover { background: #1a4a7a; }

    #status {
      margin-top: 12px;
      font-size: 12px;
      min-height: 16px;
    }

    #status.success { color: #66bb6a; }
    #status.error   { color: #ef9a9a; }

    .hint {
      font-size: 11px;
      color: #6a6a7a;
      margin-top: 4px;
    }
  </style>
</head>
<body>
  <h1>Lingua Settings</h1>

  <div class="field">
    <label for="server-url">Server URL</label>
    <input type="url" id="server-url" placeholder="http://127.0.0.1:5000" />
    <div class="hint">Default: http://127.0.0.1:5000</div>
  </div>

  <button id="btn-save">Save</button>
  <div id="status"></div>

  <script src="options.js"></script>
</body>
</html>
