services:
  libretranslate:
    image: libretranslate/libretranslate:latest
    volumes:
      - ./lt-data:/home/libretranslate/.local
    environment:
      LT_LOAD_ONLY: "en,pt,ja,es,fr,de,zh,ko,ar,ru,it"
    restart: unless-stopped

  proxy:
    build:
      context: ./server
    ports:
      - "5000:5000"
    environment:
      LT_URL: "http://libretranslate:5000"
      PORT: "5000"
    depends_on:
      libretranslate:
        condition: service_started
    restart: unless-stopped
